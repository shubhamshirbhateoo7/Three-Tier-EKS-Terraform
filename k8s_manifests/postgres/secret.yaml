apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: hm-shop
type: Opaque
# Generate your own base64 values:
#   echo -n "your-db-user"     | base64
#   echo -n "your-db-password" | base64
#   echo -n "your-db-name"     | base64
# DB_PASSWORD must match backend-secret DB_PASSWORD exactly.
data:
  POSTGRES_USER:     <BASE64_ENCODED_DB_USER>
  POSTGRES_PASSWORD: <BASE64_ENCODED_DB_PASSWORD>
  POSTGRES_DB:       <BASE64_ENCODED_DB_NAME>
