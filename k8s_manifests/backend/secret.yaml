apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: hm-shop
type: Opaque
# Generate your own base64 values:
#   echo -n "your-db-password" | base64
#   echo -n "your-jwt-secret"  | base64
data:
  DB_PASSWORD: <BASE64_ENCODED_DB_PASSWORD>
  JWT_SECRET:  <BASE64_ENCODED_JWT_SECRET>
