apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: hm-shop
  labels:
    app: backend
    tier: application
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
        tier: application
    spec:
      serviceAccountName: backend-sa
      securityContext:
        runAsNonRoot: true
        runAsUser:    1000
        runAsGroup:   1000
      containers:
        - name: backend
          image: <YOUR_AWS_ACCOUNT_ID>.dkr.ecr.ap-south-1.amazonaws.com/hm-backend:latest
          ports:
            - containerPort: 5000
          env:
            - name:  DB_HOST
              value: postgres-service
            - name:  DB_PORT
              value: "5432"
            - name:  DB_NAME
              value: hmshop
            - name:  DB_USER
              value: hmuser
            - name:  PORT
              value: "5000"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key:  DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key:  JWT_SECRET
          resources:
            requests:
              cpu:    "200m"
              memory: "256Mi"
            limits:
              cpu:    "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds:       15
            timeoutSeconds:      5
            failureThreshold:    3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds:       10
            timeoutSeconds:      3
            failureThreshold:    3
