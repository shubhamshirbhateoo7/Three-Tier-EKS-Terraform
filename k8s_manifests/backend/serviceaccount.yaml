apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: hm-shop
  annotations:
    # IRSA: This annotation binds the K8s ServiceAccount to the IAM Role
    # Replace 288761770942 with your actual AWS Account ID (injected by Step 9)
    eks.amazonaws.com/role-arn: arn:aws:iam::288761770942:role/hm-shop-backend-ecr-role
  labels:
    app: backend
